    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex gap-6">
      <div class="flex-1 min-w-0">

        <!-- Status Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="activeTab === 'all' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="activeTab = 'all'"
          >全部 <span class="opacity-60" x-text="'(' + favCount + ')'"></span></button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="activeTab === 'unread' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="activeTab = 'unread'"
          >未读</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="activeTab === 'pending' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="activeTab = 'pending'"
          >待处理</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="activeTab === 'applied' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="activeTab = 'applied'"
          >已报名</button>
        </div>

        <!-- Loading -->
        <div class="text-center py-16" x-show="loading" x-cloak style="display:none">
          <div class="loading loading-spinner loading-lg text-emerald-600"></div>
          <p class="text-gray-500 mt-3">加载中...</p>
        </div>

        <!-- Bid Cards -->
        <div class="space-y-3" x-show="!loading && filteredFavs.length > 0">
          <template x-for="bid in filteredFavs" :key="bid.id">
            <a :href="'/detail.html?id=' + bid.id" class="block bg-white rounded-xl shadow-sm border border-gray-100 p-4 card-hover fade-in relative">
              <!-- Status indicator dot -->
              <span x-show="getFavStatus(bid.id) === 'unread'"
                class="absolute top-3 left-3 w-2 h-2 rounded-full bg-emerald-500"
                title="未读"></span>
              <!-- Remove favorite button -->
              <button @click.prevent="removeFav(bid.id)"
                class="absolute top-3 right-3 w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-50 transition-colors z-10"
                title="取消收藏">
                <svg class="w-4 h-4 text-red-400 hover:text-red-500" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
              </button>
              <!-- Type badge -->
              <span class="inline-block text-xs font-medium px-1.5 py-0.5 rounded mb-2"
                :class="methodBadgeClass(bid.method)"
                x-text="bid.method || '公告'"></span>
              <!-- Title -->
              <h3 class="font-semibold text-gray-900 text-sm leading-snug mb-2 pr-6" x-text="bid.title"></h3>
              <!-- Product tags -->
              <div class="flex flex-wrap gap-1 mb-2" x-show="bid.products && bid.products.length > 0">
                <template x-for="p in bid.products.slice(0, 3)" :key="p">
                  <span class="text-xs px-1.5 py-0.5 rounded-full bg-blue-50 text-blue-600 border border-blue-100" x-text="p"></span>
                </template>
                <span x-show="bid.products && bid.products.length > 3" class="text-xs text-gray-400">+<span x-text="bid.products.length - 3"></span></span>
              </div>
              <!-- Info row -->
              <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500 mb-2">
                <span x-text="bid.source" class="font-medium" :class="sourceTextClass(bid.source)"></span>
                <span x-text="bid.region || ''" x-show="bid.region"></span>
                <span x-text="bid.industry || ''" x-show="bid.industry"></span>
              </div>
              <!-- Budget + Deadline row -->
              <div class="flex items-center justify-between text-xs pt-2 border-t border-gray-50">
                <span class="text-gray-500">💰 <span x-text="bid.budget || '暂无'"></span></span>
                <span>
                  <span x-show="bid.deadline" class="inline-flex items-center gap-1"
                    :class="countdownClass(bid.deadline)">
                    <span x-text="countdownText(bid.deadline)"></span>
                  </span>
                  <span x-show="!bid.deadline" class="text-gray-400" x-text="bid.date || ''"></span>
                </span>
              </div>
            </a>
          </template>
        </div>

        <!-- Empty State -->
        <div class="text-center py-20" x-show="!loading && filteredFavs.length === 0">
          <div class="text-5xl mb-4">⭐</div>
          <p class="text-gray-500 text-lg mb-2">还没有收藏任何标讯</p>
          <p class="text-gray-400 text-sm mb-6">去标讯大全浏览并收藏感兴趣的标讯</p>

        <div class="text-xs text-gray-400">数据来源：国家级平台 · 省级平台 · 招标代理 · 医院高校</div>
      </div>
      <div class="mt-4 pt-4 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 标讯宝 · 未经许可禁止批量抓取数据
      </div>
    </div>
  </footer>

  <script>
    function favoritesApp() {
      return {
        activeTab: 'all',
        allBids: [],
        loading: false,

        init() {
          this.loadFromLocal();
        },

        loadFromLocal() {
          this.loading = true;
          this.allBids = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('fav_') && !key.startsWith('fav_meta_') && localStorage.getItem(key) === 'true') {
              const id = key.replace('fav_', '');
              // 从 localStorage 读取收藏时保存的元数据
              try {
                const metaStr = localStorage.getItem('fav_meta_' + id);
                if (metaStr) {
                  const meta = JSON.parse(metaStr);
                  this.allBids.push({
                    id,
                    title: meta.title || '',
                    method: meta.method || '',
                    source: meta.source || '',
                    industry: meta.industry || '',
                    region: meta.region || '',
                    budget: meta.budget || '',
                    date: meta.date || '',
                    deadline: meta.deadline || '',
                    savedAt: meta.savedAt || '',
                  });
                }
              } catch(e) {
                console.error('Error loading fav meta:', id, e);
              }
            }
          }
          // 按收藏时间倒序
          this.allBids.sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
          this.loading = false;
        },

        getFavStatus(id) {
          try {
            const meta = localStorage.getItem('fav_meta_' + id);
            if (meta) {
              const parsed = JSON.parse(meta);
              return parsed.status || 'unread';
            }
          } catch(e) {}
          return 'unread';
        },

        get filteredFavs() {
          if (this.activeTab === 'all') return this.allBids;
          return this.allBids.filter(b => {
            const status = this.getFavStatus(b.id);
            if (this.activeTab === 'unread') return status === 'unread';
            if (this.activeTab === 'pending') return status === 'pending';
            if (this.activeTab === 'applied') return status === 'applied';
            return true;
          });
        },

        get favCount() {
          return this.allBids.length;
        },

        removeFav(id) {
          localStorage.removeItem('fav_' + id);
          localStorage.removeItem('fav_meta_' + id);
          this.allBids = this.allBids.filter(b => String(b.id) !== String(id));
        },

        // —— 类型Badge颜色 ——
        methodBadgeClass(method) {
          const map = {
            '公开招标': 'bg-blue-50 text-blue-600',
            '中标公告': 'bg-green-50 text-green-600',
            '中标/成交': 'bg-green-50 text-green-600',
            '更正公告': 'bg-orange-50 text-orange-600',
            '废标': 'bg-red-50 text-red-600',
            '竞争性磋商': 'bg-purple-50 text-purple-600',
            '竞争性谈判': 'bg-purple-50 text-purple-600',
            '询价': 'bg-cyan-50 text-cyan-600',
            '询价公告': 'bg-cyan-50 text-cyan-600',
            '单一来源': 'bg-pink-50 text-pink-600',
            '其他公告': 'bg-gray-50 text-gray-500',
            '预告': 'bg-amber-50 text-amber-600',
            '方案征集': 'bg-gray-50 text-gray-600',
            '竞价': 'bg-yellow-50 text-yellow-600',
          };
          return map[method] || 'bg-gray-50 text-gray-600';
        },

        // —— 倒计时 ——
        countdownText(deadline) {
          if (!deadline) return '';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return '⏰ 已截止';
          if (diff === 1) return '⏰ 今日截止';
          return `⏰ 剩余${diff}天`;
        },
        countdownClass(deadline) {
          if (!deadline) return 'text-gray-400';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return 'text-red-500 font-medium';
          if (diff <= 3) return 'text-orange-500 font-medium';
          return 'text-gray-500';
        },

        // —— 来源文本颜色 ——
        sourceTextClass(source) {
          const map = {
            '国招平台': 'text-blue-600',
            '政府采购网': 'text-emerald-600',
            '省平台': 'text-purple-600',
            '招标代理': 'text-orange-600',
            '医院官网': 'text-rose-600',
            '高校官网': 'text-cyan-600',
            '招标投标公共服务平台': 'text-blue-600',
          };
          return map[source] || 'text-gray-500';
        },
      }
    }
  </script>
