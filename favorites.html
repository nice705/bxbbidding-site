<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 — 标讯宝</title>
  <meta name="description" content="查看您收藏的招标采购标讯信息。">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/theme/light.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    [x-cloak] { display: none !important; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#059669' } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen overflow-x-hidden pb-20" x-data="favApp()">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-4">
          <a href="/" class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-lg hero-gradient flex items-center justify-center">
              <span class="text-white font-bold text-xs">标</span>
            </div>
            <span class="text-lg font-bold text-gray-900">标讯宝</span>
          </a>
          <span class="text-gray-300">/</span>
          <span class="text-sm text-emerald-600 font-medium">我的收藏</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- Loading -->
    <div class="text-center py-16" x-show="loading">
      <div class="loading loading-spinner loading-lg text-emerald-600"></div>
      <p class="text-gray-500 mt-4">加载中...</p>
    </div>

    <!-- Empty State -->
    <div class="text-center py-20" x-show="!loading && favBids.length === 0">
      <div class="text-6xl mb-4">⭐</div>
      <p class="text-gray-500 text-lg mb-2">暂无收藏</p>
      <p class="text-gray-400 text-sm mb-6">在标讯详情页点击收藏按钮，即可在这里查看</p>
      <a href="/list.html" class="inline-flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors">
        去浏览标讯
      </a>
    </div>

    <!-- Favorites List -->
    <div x-show="!loading && favBids.length > 0" class="space-y-3">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-900">
          收藏的标讯 <span class="text-sm font-normal text-gray-400" x-text="'(' + favBids.length + '条)'"></span>
        </h2>
        <button @click="clearAll()" class="text-xs text-red-400 hover:text-red-600 transition-colors">
          清空收藏
        </button>
      </div>

      <template x-for="bid in favBids" :key="bid.id">
        <a :href="'/detail.html?id=' + bid.id" class="block bg-white rounded-xl shadow-sm border border-gray-100 p-4 card-hover fade-in">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-gray-900 text-sm mb-2 leading-snug line-clamp-2" x-text="bid.title"></h3>
              <div class="flex flex-wrap items-center gap-2 text-xs">
                <span class="badge badge-sm bg-emerald-50 text-emerald-600 border-emerald-200" x-text="bid.source || '未知来源'"></span>
                <span class="text-gray-400" x-text="bid.date || ''"></span>
                <span class="text-gray-400" x-text="bid.region || ''"></span>
              </div>
            </div>
            <button @click.prevent="removeFav(bid.id)" class="flex-shrink-0 text-red-400 hover:text-red-600 p-1">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </button>
          </div>
        </a>
      </template>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-around h-16" style="padding-bottom: max(0, env(safe-area-inset-bottom));">
        <a href="/" class="flex flex-col items-center gap-0.5 group">
          <svg class="w-5 h-5 text-gray-400 group-hover:text-emerald-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-emerald-600 transition-colors">首页</span>
        </a>
        <a href="/list.html" class="flex flex-col items-center gap-0.5 group">
          <svg class="w-5 h-5 text-gray-400 group-hover:text-emerald-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-emerald-600 transition-colors">标讯大全</span>
        </a>
        <a href="/favorites.html" class="flex flex-col items-center gap-0.5 group">
          <svg class="w-5 h-5 text-emerald-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          <span class="text-xs font-medium text-emerald-600">我的收藏</span>
        </a>
        <a href="/subscribe.html" class="flex flex-col items-center gap-0.5 group">
          <svg class="w-5 h-5 text-gray-400 group-hover:text-emerald-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-emerald-600 transition-colors">订阅管理</span>
        </a>
      </div>
    </div>
  </nav>

  <script>
    function favApp() {
      return {
        favBids: [],
        loading: true,

        async init() {
          await this.loadFavs();
          this.loading = false;
        },

        async loadFavs() {
          // Get favorited IDs from localStorage
          const favIds = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fav_') && !k.startsWith('fav_meta_')) {
              favIds.push({ id: k.slice(4), meta: JSON.parse(localStorage.getItem('fav_meta_' + k.slice(4)) || '{}') });
            }
          }

          if (favIds.length === 0) return;

          // Try to load bid details
          try {
            const sources = ['/data/bids.json', 'https://raw.githubusercontent.com/nice705/bxbbidding-site/main/data/bids.json'];
            let allBids = [];
            for (const url of sources) {
              try {
                const resp = await fetch(url);
                if (resp.ok) {
                  const data = await resp.json();
                  allBids = data.bids || [];
                  if (allBids.length > 0) break;
                }
              } catch(e) {}
            }

            // Match favorites with full bid data
            this.favBids = favIds.map(f => {
              const full = allBids.find(b => b.id === f.id);
              return full || { id: f.id, title: f.meta.title || '未知标讯', source: f.meta.source || '', date: f.meta.date || '', region: f.meta.region || '' };
            });
          } catch(e) {
            // Fallback: use stored metadata
            this.favBids = favIds.map(f => ({
              id: f.id,
              title: f.meta.title || '未知标讯',
              source: f.meta.source || '',
              date: f.meta.date || '',
              region: f.meta.region || ''
            }));
          }
        },

        removeFav(id) {
          localStorage.removeItem('fav_' + id);
          localStorage.removeItem('fav_meta_' + id);
          this.favBids = this.favBids.filter(b => b.id !== id);
        },

        clearAll() {
          if (!confirm('确定清空所有收藏？')) return;
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fav_')) keys.push(k);
          }
          keys.forEach(k => localStorage.removeItem(k));
          this.favBids = [];
        }
      }
    }
  </script>

</body>
</html>
