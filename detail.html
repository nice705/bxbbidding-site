  <script>
    // SEO 辅助：更新 meta 和 OG 标签
    function setMeta(name, content) {
      // Regular meta
      let el = document.querySelector('meta[name="' + name + '"]')
      if (el) { el.content = content; return }
      // OG meta
      el = document.querySelector('meta[property="' + name + '"]')
      if (el) el.content = content
    }

    function detailApp() {
      return {
        bid: null,
        bidId: null,
        loading: true,
        pageSize: 20,
        keywords: [],
        favedIds: {},

        async init() {
          this.loadFavs();
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          const q = params.get('q');
          if (q) {
            this.keywords = q.split(',').map(k => k.trim()).filter(k => k);
          }
          if (!id) { this.loading = false; return; }
          await this.loadBid(id);
        },

        loadFavs() {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fav_') && !k.startsWith('fav_meta_')) {
              this.favedIds[k.slice(4)] = true;
            }
          }
        },

        highlightText(text) {
          if (!text || this.keywords.length === 0) return text;
          let result = text;
          this.keywords.forEach(kw => {
            if (!kw) return;
            const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            result = result.replace(regex, '<span style="color:red">$1</span>');
          });
          return result;
        },

        async loadBid(id) {
          try {
            const resp = await fetch('/api/bids/' + id);
            if (!resp.ok) { this.loading = false; return; }
            const data = await resp.json();
            const b = data.bid;
            if (!b) { this.loading = false; return; }
            // Highlight title & content
            b._title = this.highlightText(b.title);
            b._content = b.content ? this.highlightText(b.content) : '';
            this.bid = b;

            document.title = b.title + ' — 标讯宝'
            const desc = b.budget + ' · ' + b.buyer + ' · ' + b.deadline + '截止 · ' + b.region
            setMeta('description', desc)
            setMeta('og:title', b.title)
            setMeta('og:description', desc)
            setMeta('og:url', window.location.href)
            const link = document.querySelector('link[rel="canonical"]')
            if (link) link.href = window.location.href
            const script = document.getElementById('ld-breadcrumb')
            if (script) {
              script.textContent = JSON.stringify({
                '@context': 'https://schema.org',
                '@type': 'BreadcrumbList',
                'itemListElement': [
                  { '@type': 'ListItem', 'position': 1, 'name': '首页', 'item': 'https://qgbxb.com/' },
                  { '@type': 'ListItem', 'position': 2, 'name': '标讯大全', 'item': 'https://qgbxb.com/list.html' },
                  { '@type': 'ListItem', 'position': 3, 'name': b.title }
                ]
              })
            }
          } catch(e) {
            console.error(e);
          }
          // If still no bid, try to construct from URL params
          if (!this.bid) {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('t') || '';
            const source = params.get('s') || '';
            const sourceUrl = params.get('u') || '';
            if (title) {
              this.bid = { id: id, title: decodeURIComponent(title), source: decodeURIComponent(source), sourceUrl: decodeURIComponent(sourceUrl), content: '', date: '', region: '' };
            }
          }
          this.loading = false;
        },

        sourceBadgeClass(source) {
          const map = {
            '国招平台': 'bg-blue-50 text-blue-600 border-blue-200',
            '政府采购网': 'bg-emerald-50 text-emerald-600 border-emerald-200',
            '省平台': 'bg-purple-50 text-purple-600 border-purple-200',
            '招标代理': 'bg-orange-50 text-orange-600 border-orange-200',
            '医院官网': 'bg-rose-50 text-rose-600 border-rose-200',
            '高校官网': 'bg-cyan-50 text-cyan-600 border-cyan-200',
          };
          return map[source] || 'bg-gray-50 text-gray-600 border-gray-200';
        },

        // —— 类型Badge颜色 ——
        methodBadgeClass(method) {
          const map = {
            '公开招标': 'bg-blue-50 text-blue-600',
            '中标公告': 'bg-green-50 text-green-600',
            '中标/成交': 'bg-green-50 text-green-600',
            '更正公告': 'bg-orange-50 text-orange-600',
            '废标': 'bg-red-50 text-red-600',
            '竞争性磋商': 'bg-purple-50 text-purple-600',
            '竞争性谈判': 'bg-purple-50 text-purple-600',
            '询价': 'bg-cyan-50 text-cyan-600',
            '询价公告': 'bg-cyan-50 text-cyan-600',
            '单一来源': 'bg-pink-50 text-pink-600',
            '其他公告': 'bg-gray-50 text-gray-500',
            '预告': 'bg-amber-50 text-amber-600',
            '方案征集': 'bg-gray-50 text-gray-600',
            '竞价': 'bg-yellow-50 text-yellow-600',
          };
          return map[method] || 'bg-gray-50 text-gray-600';
        },

        // —— 倒计时 ——
        countdownText(deadline) {
          if (!deadline) return '';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return '⏰ 已截止';
          if (diff === 1) return '⏰ 今日截止';
          return `⏰ 剩余${diff}天`;
        },
        countdownClass(deadline) {
          if (!deadline) return 'text-gray-400';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return 'text-red-500 font-medium';
          if (diff <= 3) return 'text-orange-500 font-medium';
          return 'text-gray-500';
        },

        // —— 收藏 ——
        toggleFav(bid, event) {
          const id = bid.id || bid._id;
          const title = bid.title || '';
          if (this.favedIds[id]) {
            delete this.favedIds[id];
            localStorage.removeItem('fav_' + id);
            localStorage.removeItem('fav_meta_' + id);
            window.__toast && window.__toast('已取消收藏', 'info');
          } else {
            this.favedIds[id] = true;
            localStorage.setItem('fav_' + id, 'true');
            localStorage.setItem('fav_meta_' + id, JSON.stringify({
              title,
              method: bid.method || '',
              source: bid.source || '',
              industry: bid.industry || '',
              region: bid.region || '',
              budget: bid.budget || '',
              date: bid.date || '',
              deadline: bid.deadline || '',
              savedAt: new Date().toISOString(),
            }));
          }
          if (event) event.stopPropagation();
        },
        isFav(id) {
          return !!this.favedIds[id];
        },

        isContentBlocked(content) {
          return content && (content.includes('页面访问提示') || content.includes('暂停访问') || content.includes('PDF 文件') || content.includes('pdf-pending') || content.includes('内容待提取'));
        },

        // —— 来源文本颜色 ——
        sourceTextClass(source) {
          const map = {
            '国招平台': 'text-blue-600',
            '政府采购网': 'text-emerald-600',
            '省平台': 'text-purple-600',
            '招标代理': 'text-orange-600',
            '医院官网': 'text-rose-600',
            '高校官网': 'text-cyan-600',
            '招标投标公共服务平台': 'text-blue-600',
          };
          return map[source] || 'text-gray-500';
        }
      }
    }
  </script>

  <div x-data="toastManager()">

  <script>
    // 全局收藏管理器 — 使用 fav_{id} = true/false 存储在 localStorage
    window.favoriteManager = {
      getFavs() {
        const all = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('fav_')) {
            all[key] = localStorage.getItem(key) === 'true';
          }
        }
        return all;
      },
      isFaved(id) {
        return localStorage.getItem('fav_' + id) === 'true';
      },
      toggle(id, title) {
        const key = 'fav_' + id;
        const current = localStorage.getItem(key);
        if (current === 'true') {
          localStorage.setItem(key, 'false');
          window.__toast && window.__toast('已取消收藏', 'info');
        } else {
          localStorage.setItem(key, 'true');
          window.__toast && window.__toast('已收藏', 'success');
        }
        // Force Alpine re-evaluation by dispatching a custom event
        window.dispatchEvent(new CustomEvent('fav-changed'));
      },
      getCount() {
        let count = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('fav_') && localStorage.getItem(key) === 'true') {
            count++;
          }
        }
        return count;
      }
    };

    function toastManager() {
      return {
        show: false,
        message: '',
        type: 'success',
        timeout: null,
        init() {
          window.__toast = (msg, type) => {
            this.message = msg;
            this.type = type || 'success';
            this.show = true;
            clearTimeout(this.timeout);
            this.timeout = setTimeout(() => { this.show = false; }, 2000);
          };
        }
      }
    }
  </script>
