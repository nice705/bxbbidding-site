<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标讯大全 — 免费全网招标采购信息平台 | 标讯宝</title>
  <meta name="description" content="浏览全部招标采购标讯，按行业、来源、时间精准筛选。支持关键词搜索，覆盖医疗设备、IT信息化、工程建设等8大行业，每日更新。">

  <!-- Open Graph -->
  <meta property="og:title" content="标讯大全 — 免费全网招标采购信息平台 | 标讯宝">
  <meta property="og:description" content="浏览全部招标采购标讯，按行业、来源、时间精准筛选。覆盖医疗设备、IT信息化、工程建设等8大行业，每日更新。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bidding-site.pages.dev/list.html">
  <meta property="og:locale" content="zh_CN">

  <!-- Canonical -->
  <link rel="canonical" href="https://bidding-site.pages.dev/list.html">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "首页", "item": "https://bidding-site.pages.dev/" },
      { "@type": "ListItem", "position": 2, "name": "标讯大全" }
    ]
  }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/theme/light.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
    .bid-source-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 999px; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    [x-cloak] { display: none !important; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#059669', 'primary-dark': '#047857' } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="listApp()">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg hero-gradient flex items-center justify-center">
              <span class="text-white font-bold text-sm">标</span>
            </div>
            <span class="text-xl font-bold text-gray-900">标讯宝</span>
          </a>
          <div class="hidden md:flex items-center gap-6">
            <a href="/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">首页</a>
            <a href="/list.html" class="text-emerald-600 font-medium text-sm">标讯大全</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Search Bar -->
  <div class="bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex gap-2 max-w-3xl">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            placeholder="输入关键词搜索..."
            class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-200"
            x-model="keyword"
            @keydown.enter="search()"
          />
        </div>
        <button class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors" @click="search()">搜索</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex gap-6">

      <!-- Sidebar Filters -->
      <div class="hidden lg:block w-56 flex-shrink-0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sticky top-24">

          <div class="mb-5">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">行业</h3>
            <div class="space-y-1.5">
              <template x-for="ind in industries" :key="ind">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="industry" :value="ind" x-model="filters.industry" class="radio radio-sm radio-emerald-500" />
                  <span class="text-sm text-gray-600" x-text="ind"></span>
                </label>
              </template>
            </div>
          </div>

          <div class="mb-5">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">来源</h3>
            <div class="space-y-1.5">
              <template x-for="src in sources" :key="src">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" :value="src" x-model="filters.sources" class="checkbox checkbox-sm checkbox-emerald-500" />
                  <span class="text-sm text-gray-600" x-text="src"></span>
                </label>
              </template>
            </div>
          </div>

          <div>
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">时间</h3>
            <select x-model="filters.dateRange" class="select select-bordered select-sm w-full text-sm">
              <option value="all">全部时间</option>
              <option value="today">今天</option>
              <option value="3days">近3天</option>
              <option value="week">近一周</option>
              <option value="month">近一月</option>
            </select>
          </div>

          <button class="btn btn-sm w-full mt-5 bg-emerald-600 text-white hover:bg-emerald-700 border-0" @click="resetFilters()">重置筛选</button>
        </div>
      </div>

      <!-- Main List -->
      <div class="flex-1 min-w-0">

        <!-- Results Info -->
        <div class="flex items-center justify-between mb-4">
          <div class="text-sm text-gray-500">
            共找到 <span class="font-bold text-gray-900" x-text="totalResults"></span> 条标讯
            <span x-show="keyword" class="text-gray-400">
              ，搜索 " <span class="text-emerald-600 font-medium" x-text="keyword"></span> "
            </span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400">排序：</span>
            <select x-model="filters.sort" class="select select-bordered select-xs text-xs">
              <option value="newest">最新</option>
              <option value="relevant">最相关</option>
            </select>
          </div>
        </div>

        <!-- Mobile Filter Toggle -->
        <div class="flex lg:hidden gap-2 mb-4 overflow-x-auto pb-2">
          <template x-for="ind in industries" :key="ind">
            <button
              class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
              :class="filters.industry === ind ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
              @click="filters.industry = filters.industry === ind ? '' : ind"
              x-text="ind"
            ></button>
          </template>
        </div>

        <!-- Bid Cards -->
        <div class="space-y-3">
          <template x-for="bid in pagedBids" :key="bid.id">
            <a :href="'/detail.html?id=' + bid.id" class="block bg-white rounded-xl shadow-sm border border-gray-100 p-5 card-hover fade-in">
              <div class="flex items-center justify-between mb-2">
                <span class="bid-source-badge font-medium" :class="sourceBadgeClass(bid.source)" x-text="bid.source"></span>
                <span class="text-xs text-gray-400" x-text="bid.date"></span>
              </div>
              <h3 class="font-semibold text-gray-900 text-base mb-2 leading-snug" x-text="bid.title"></h3>
              <div class="flex flex-wrap gap-1.5 mb-3">
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.industry"></span>
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.region"></span>
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.method"></span>
              </div>
              <div class="flex items-center justify-between text-xs text-gray-500 pt-3 border-t border-gray-50">
                <span>💰 <span x-text="bid.budget"></span></span>
                <span>📅 <span x-text="bid.deadline"></span></span>
              </div>
            </a>
          </template>
        </div>

        <!-- Empty -->
        <div class="text-center py-20" x-show="filteredBids.length === 0">
          <div class="text-5xl mb-4">🔍</div>
          <p class="text-gray-500 text-lg mb-2">没有找到匹配的标讯</p>
          <p class="text-gray-400 text-sm">试试换个关键词或筛选条件</p>
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-center gap-2 mt-8" x-show="totalPages > 1">
          <button
            class="px-3 py-1.5 text-sm rounded-lg transition-colors"
            :class="currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'"
            :disabled="currentPage === 1"
            @click="currentPage > 1 && (currentPage--)"
          >上一页</button>
          <template x-for="p in totalPages" :key="p">
            <button
              class="w-8 h-8 text-sm rounded-lg transition-colors"
              :class="currentPage === p ? 'bg-emerald-600 text-white' : 'text-gray-600 hover:bg-gray-100'"
              @click="currentPage = p"
              x-text="p"
            ></button>
          </template>
          <button
            class="px-3 py-1.5 text-sm rounded-lg transition-colors"
            :class="currentPage === totalPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'"
            :disabled="currentPage === totalPages"
            @click="currentPage < totalPages && (currentPage++)"
          >下一页</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-100 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-2">
        <div class="text-xs text-gray-400">标讯宝 — 免费标讯查询平台</div>
        <div class="text-xs text-gray-400">数据来源：国家级平台 · 省级平台 · 招标代理 · 医院高校</div>
      </div>
      <div class="mt-4 pt-4 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 标讯宝 · 未经许可禁止批量抓取数据
      </div>
    </div>
  </footer>

  <script>
    function listApp() {
      return {
        keyword: '',
        filters: { industry: '', sources: [], dateRange: 'all', sort: 'newest' },
        currentPage: 1,
        pageSize: 15,
        industries: ['医疗设备', 'IT信息化', '工程建设', '教育科研', '后勤服务', '纺织服装', '交通运输', '环保能源'],
        sources: ['国招平台', '政府采购网', '省平台', '招标代理', '医院官网', '高校官网'],
        bids: [],

        async init() {
          await this.loadData();
          const params = new URLSearchParams(window.location.search);
          if (params.get('q')) {
            this.keyword = params.get('q');
            await this.loadDataWithSearch();
          }
        },

        async loadData() {
          try {
            const resp = await fetch('/data/bids.json');
            const data = await resp.json();
            this.bids = data.bids || [];
          } catch(e) {
            console.log('Data loading deferred');
          }
        },

        search() {
          this.currentPage = 1;
          // Update URL params
          const url = new URL(window.location);
          if (this.keyword.trim()) {
            url.searchParams.set('q', this.keyword.trim());
          } else {
            url.searchParams.delete('q');
          }
          window.history.replaceState({}, '', url);
          // Reload data with search query
          this.loadDataWithSearch();
        },

        async loadDataWithSearch() {
          try {
            const resp = await fetch('/data/bids.json');
            const data = await resp.json();
            this.bids = data.bids || [];
            this.currentPage = 1;
          } catch(e) {
            console.log('Search failed');
          }
        },

        get filteredBids() {
          let result = this.bids;

          // Industry filter
          if (this.filters.industry) {
            result = result.filter(b => b.industry === this.filters.industry);
          }

          // Source filter
          if (this.filters.sources.length > 0) {
            result = result.filter(b => this.filters.sources.includes(b.source));
          }

          // Date range filter
          if (this.filters.dateRange !== 'all') {
            const now = new Date();
            const ranges = { 'today': 1, '3days': 3, 'week': 7, 'month': 30 };
            const days = ranges[this.filters.dateRange] || 0;
            if (days > 0) {
              const cutoff = new Date(now.setDate(now.getDate() - days));
              result = result.filter(b => new Date(b.date) >= cutoff);
            }
          }

          // Sort
          if (this.filters.sort === 'newest') {
            result.sort((a, b) => new Date(b.date) - new Date(a.date));
          }

          return result;
        },

        get totalResults() { return this.filteredBids.length; },
        get totalPages() { return Math.max(1, Math.ceil(this.filteredBids.length / this.pageSize)); },

        get pagedBids() {
          const start = (this.currentPage - 1) * this.pageSize;
          return this.filteredBids.slice(start, start + this.pageSize);
        },

        sourceBadgeClass(source) {
          const map = {
            '国招平台': 'bg-blue-50 text-blue-600 border-blue-200',
            '政府采购网': 'bg-emerald-50 text-emerald-600 border-emerald-200',
            '省平台': 'bg-purple-50 text-purple-600 border-purple-200',
            '招标代理': 'bg-orange-50 text-orange-600 border-orange-200',
            '医院官网': 'bg-rose-50 text-rose-600 border-rose-200',
            '高校官网': 'bg-cyan-50 text-cyan-600 border-cyan-200',
          };
          return map[source] || 'bg-gray-50 text-gray-600 border-gray-200';
        },

        resetFilters() {
          this.filters = { industry: '', sources: [], dateRange: 'all', sort: 'newest' };
          this.keyword = '';
          this.currentPage = 1;
          const url = new URL(window.location);
          url.searchParams.delete('q');
          window.history.replaceState({}, '', url);
          this.loadData();
        }
      }
    }
  </script>

  <!-- 订阅浮窗 + 自动弹窗 -->
  <div x-data="subscribePrompt()">
    <button @mouseenter="openModal()" @click="openModal()" x-show="!showModal"
      class="fixed right-0 top-1/2 -translate-y-1/2 z-40
             bg-emerald-600 text-white rounded-l-lg shadow-lg
             hover:bg-emerald-700 hover:pr-0.5 transition-all
             w-14 py-2.5 flex flex-col items-center gap-1.5
             text-sm leading-tight cursor-pointer font-medium">
      <span class="text-lg">📢</span>
      <span>免费订阅</span>
      <span>微信推送</span>
    </button>
    <div x-show="showModal" x-cloak
      class="fixed inset-0 bg-black/30 z-50 flex items-center justify-center p-4"
      @click.away="closeModal()">
      <div class="bg-white rounded-2xl p-6 text-center max-w-xs w-full shadow-xl" x-show="showModal" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
        <div class="flex justify-end -mt-2 -mr-2 mb-1">
          <button @click="closeModal()" class="text-gray-300 hover:text-gray-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <img src="/static/wxpusher-qr.svg" alt="微信扫码关注" class="w-44 mx-auto mb-3">
        <p class="text-base font-semibold text-gray-800">📢 免费订阅每日标讯</p>
        <p class="text-xs text-gray-400 mt-1 leading-relaxed">微信扫码关注<br>每天推送最新标讯，不错过任何机会</p>
        <button @click="closeModal()" class="mt-4 text-xs text-gray-400 hover:text-gray-600 underline underline-offset-2">暂不订阅</button>
      </div>
    </div>
  </div>

  <script>
    function subscribePrompt() {
      return {
        showModal: false,
        init() {
          setTimeout(() => {
            this.showModal = true
          }, 3000)
        },
        openModal() { this.showModal = true },
        closeModal() { this.showModal = false }
      }
    }
  </script>

 </body>
</html>
