<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标讯大全 — 免费全网招标采购信息平台 | 标讯宝</title>
  <meta name="description" content="浏览全部招标采购标讯，按地区、时间精准筛选。支持关键词搜索，覆盖医疗设备、IT信息化、工程建设等8大行业，每日更新。">

  <!-- Open Graph -->
  <meta property="og:title" content="标讯大全 — 免费全网招标采购信息平台 | 标讯宝">
  <meta property="og:description" content="浏览全部招标采购标讯，按地区、时间精准筛选。覆盖医疗设备、IT信息化、工程建设等8大行业，每日更新。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bidding-site.pages.dev/list.html">
  <meta property="og:locale" content="zh_CN">

  <!-- Canonical -->
  <link rel="canonical" href="https://bidding-site.pages.dev/list.html">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "首页", "item": "https://bidding-site.pages.dev/" },
      { "@type": "ListItem", "position": 2, "name": "标讯大全" }
    ]
  }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/theme/light.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
    .bid-source-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 999px; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    [x-cloak] { display: none !important; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#059669', 'primary-dark': '#047857' } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen overflow-x-hidden pb-16" x-data="listApp()">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg hero-gradient flex items-center justify-center">
              <span class="text-white font-bold text-sm">标</span>
            </div>
            <span class="text-xl font-bold text-gray-900">标讯宝</span>
          </a>
          <div class="hidden md:flex items-center gap-6">
            <a href="/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">首页</a>
            <a href="/list.html" class="text-emerald-600 font-medium text-sm">标讯大全</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Search Bar -->
  <div class="bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="space-y-3">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            placeholder="输入关键词搜索标讯..."
            class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-200"
            x-model="keyword"
            @keydown.enter="search()"
          />
        </div>
        <div class="flex gap-1.5 flex-wrap items-center">
          <!-- 地区下拉 -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" @click.away="open = false"
              class="flex items-center gap-1 px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
              <span x-text="filters.region || '全国'" :class="filters.region ? 'text-gray-700' : 'text-gray-400'"></span>
              <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" x-cloak
              class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto min-w-[100px] py-0.5">
              <template x-for="reg in ['', ...regions]" :key="reg">
                <button @click="filters.region = reg; open = false; search()"
                  class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                  :class="filters.region === reg ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'"
                  x-text="reg || '全国'"></button>
              </template>
            </div>
          </div>
          <!-- 类别下拉 -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" @click.away="open = false"
              class="flex items-center gap-1 px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
              <span x-text="filters.category || '类别'" :class="filters.category ? 'text-gray-700' : 'text-gray-400'"></span>
              <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" x-cloak
              class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto min-w-[100px] py-0.5">
              <template x-for="cat in ['', ...categories]" :key="cat">
                <button @click="filters.category = cat; open = false; search()"
                  class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                  :class="filters.category === cat ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'"
                  x-text="cat || '全部'"></button>
              </template>
            </div>
          </div>
          <!-- 时间下拉 -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" @click.away="open = false"
              class="flex items-center gap-1 px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
              <span x-text="dateRangeLabel(filters.dateRange)" :class="filters.dateRange !== 'all' ? 'text-gray-700' : 'text-gray-400'"></span>
              <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" x-cloak
              class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 overflow-y-auto min-w-[100px] py-0.5">
              <button @click="filters.dateRange = 'all'; open = false; search()"
                class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                :class="filters.dateRange === 'all' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">时间</button>
              <button @click="filters.dateRange = 'today'; open = false; search()"
                class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                :class="filters.dateRange === 'today' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">今天</button>
              <button @click="filters.dateRange = '3days'; open = false; search()"
                class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                :class="filters.dateRange === '3days' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近3天</button>
              <button @click="filters.dateRange = 'week'; open = false; search()"
                class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                :class="filters.dateRange === 'week' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近一周</button>
              <button @click="filters.dateRange = 'month'; open = false; search()"
                class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
                :class="filters.dateRange === 'month' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近一月</button>
            </div>
          </div>
          <div class="dropdown dropdown-bottom">
            <button tabindex="0" role="button"
              class="flex items-center gap-1 w-20 px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors flex-shrink-0">
              <span class="text-gray-400">关键词</span>
              <svg class="w-3 h-3 text-gray-400 transition-transform ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div tabindex="0"
              class="dropdown-content mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-64 overflow-y-auto min-w-[180px] py-1">
              <template x-for="(group, gi) in subscriptionGroups" :key="gi">
                <div>
                  <!-- Group header + select all -->
                  <div class="flex items-center justify-between px-3 py-1.5 bg-gray-50 border-b border-gray-100">
                    <span class="text-xs font-semibold text-gray-500" x-text="group.name"></span>
                    <button
                      @click="selectAllGroup(group)"
                      class="text-xs text-emerald-500 hover:text-emerald-600 transition-colors"
                      x-text="allGroupSelected(group) ? '取消全选' : '全选'"
                    ></button>
                  </div>
                  <!-- Group keywords -->
                  <template x-for="kw in group.keywords" :key="kw">
                    <button @click="selectKeyword(kw)"
                      class="block w-full text-left px-3 py-1.5 text-xs hover:bg-emerald-50 transition-colors"
                      :class="filters.keywords.includes(kw) ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'"
                      x-text="kw">
                    </button>
                  </template>
                </div>
              </template>
              <div x-show="totalKeywords === 0" class="px-3 py-3 text-xs text-gray-400 text-center">
                暂无订阅关键词<br><a href="/subscribe.html" class="text-emerald-500 underline">去订阅设置添加</a>
              </div>
            </div>
          </div>
          <button class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-medium hover:bg-emerald-700 transition-colors flex-shrink-0" @click="search()">搜索</button>
        </div>
        <!-- Keyword chips -->
        <div class="flex flex-wrap gap-1" x-show="filters.keywords.length > 0">
          <template x-for="(kw, idx) in filters.keywords" :key="idx">
            <span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200">
              <span x-text="kw"></span>
              <button @click="removeKeyword(idx)" class="hover:text-red-500 leading-none">&times;</button>
            </span>
          </template>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex gap-6">

      <!-- Sidebar Filters -->
      <div class="hidden lg:block w-56 flex-shrink-0 overflow-hidden">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sticky top-24">

          <div class="mb-5">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">地区</h3>
            <div class="space-y-1.5">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="region" value="" x-model="filters.region" @change="search()" class="radio radio-sm radio-emerald-500" />
                <span class="text-sm text-gray-600">全国</span>
              </label>
              <template x-for="reg in regions" :key="reg">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="region" :value="reg" x-model="filters.region" @change="search()" class="radio radio-sm radio-emerald-500" />
                  <span class="text-sm text-gray-600" x-text="reg"></span>
                </label>
              </template>
            </div>
          </div>

          <div class="mb-5">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">来源</h3>
            <div class="space-y-1.5">
              <template x-for="src in sources" :key="src">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" :value="src" x-model="filters.sources" class="checkbox checkbox-sm checkbox-emerald-500" />
                  <span class="text-sm text-gray-600" x-text="src"></span>
                </label>
              </template>
            </div>
          </div>

          <button class="btn btn-sm w-full mt-4 bg-emerald-600 text-white hover:bg-emerald-700 border-0" @click="resetFilters()">重置筛选</button>
        </div>
      </div>

      <!-- Main List -->
      <div class="flex-1 min-w-0">

        <!-- Results Info -->
        <div class="flex items-center justify-between mb-4">
          <div class="text-sm text-gray-500">
            共找到 <span class="font-bold text-gray-900" x-text="totalResults"></span> 条标讯
            <span x-show="totalPages > 1" class="text-gray-400 ml-1">
              · 第 <span class="font-medium" x-text="currentPage"></span>/<span x-text="totalPages"></span> 页
            </span>
            <span x-show="keyword" class="text-gray-400">
              ，搜索 " <span class="text-emerald-600 font-medium" x-text="keyword"></span> "
            </span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400">排序：</span>
            <select x-model="filters.sort" class="select select-bordered select-xs text-xs">
              <option value="newest">最新</option>
              <option value="relevant">最相关</option>
            </select>
          </div>
        </div>

        <!-- Mobile Region + Time Filter -->
        <div class="flex lg:hidden gap-2 mb-4 overflow-x-auto pb-2">
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="!filters.region ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.region = ''; search()"
          >全国</button>
          <template x-for="reg in regions" :key="reg">
            <button
              class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
              :class="filters.region === reg ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
              @click="filters.region = filters.region === reg ? '' : reg; search()"
              x-text="reg"
            ></button>
          </template>
        </div>

        <!-- Mobile Category + Time Filter -->
        <div class="flex lg:hidden gap-2 mb-4 overflow-x-auto pb-2">
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="!filters.category ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.category = ''; search()"
          >全部</button>
          <template x-for="cat in categories" :key="cat">
            <button
              class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
              :class="filters.category === cat ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
              @click="filters.category = filters.category === cat ? '' : cat; search()"
              x-text="cat"
            ></button>
          </template>
        </div>

        <!-- Mobile Time Filter -->
        <div class="flex lg:hidden gap-2 mb-4 overflow-x-auto pb-2">
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="filters.dateRange === 'all' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.dateRange = 'all'; search()"
          >全部</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="filters.dateRange === 'today' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.dateRange = 'today'; search()"
          >今天</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="filters.dateRange === '3days' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.dateRange = '3days'; search()"
          >近3天</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="filters.dateRange === 'week' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.dateRange = 'week'; search()"
          >近一周</button>
          <button
            class="px-3 py-1.5 text-xs rounded-lg whitespace-nowrap transition-colors"
            :class="filters.dateRange === 'month' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
            @click="filters.dateRange = 'month'; search()"
          >近一月</button>
        </div>

        <!-- Loading -->
        <div class="text-center py-16" x-show="loading">
          <div class="loading loading-spinner loading-lg text-emerald-600"></div>
          <p class="text-gray-500 mt-3">搜索中...</p>
        </div>

        <!-- Bid Cards -->
        <div class="space-y-3" x-show="!loading">
          <template x-for="bid in pagedBids" :key="bid.id">
            <a :href="'/detail.html?id=' + bid.id + (keyword.trim() ? '&q=' + encodeURIComponent(keyword.trim()) : '') + (filters.region ? '&region=' + encodeURIComponent(filters.region) : '')" class="block bg-white rounded-xl shadow-sm border border-gray-100 p-5 card-hover fade-in">
              <div class="flex items-center justify-between mb-2">
                <span class="bid-source-badge font-medium" :class="sourceBadgeClass(bid.source)" x-text="bid.source"></span>
                <span class="text-xs text-gray-400" x-text="bid.date"></span>
              </div>
              <h3 class="font-semibold text-gray-900 text-base mb-2 leading-snug" x-html="highlightTitle(bid.title)"></h3>
              <div class="flex flex-wrap gap-1.5 mb-3">
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.industry"></span>
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.region"></span>
                <span class="badge badge-sm bg-gray-50 text-gray-500 border-gray-200" x-text="bid.method"></span>
              </div>
              <div class="flex items-center justify-between text-xs text-gray-500 pt-3 border-t border-gray-50">
                <span>💰 <span x-text="bid.budget || '暂无'"></span></span>
                <span>📅 <span x-text="bid.deadline || '暂无'"></span></span>
              </div>
            </a>
          </template>
        </div>

        <!-- Empty -->
        <div class="text-center py-20" x-show="!loading && pagedBids.length === 0">
          <div class="text-5xl mb-4">🔍</div>
          <p class="text-gray-500 text-lg mb-2">没有找到匹配的标讯</p>
          <p class="text-gray-400 text-sm">试试换个关键词或筛选条件</p>
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-center gap-1 mt-8 flex-wrap" x-show="totalPages > 1">
          <button
            class="px-2.5 py-1.5 text-sm rounded-lg transition-colors"
            :class="currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'"
            :disabled="currentPage === 1"
            @click="goToPage(currentPage - 1)"
          >上一页</button>
          <template x-for="p in getPageWindow()" :key="p">
            <button
              class="w-8 h-8 text-sm rounded-lg transition-colors"
              :class="currentPage === p ? 'bg-emerald-600 text-white' : 'text-gray-600 hover:bg-gray-100'"
              @click="goToPage(p)"
              x-text="p"
            ></button>
          </template>
          <span class="text-xs text-gray-400 px-1" x-show="totalPages > 7">...</span>
          <button
            class="px-2.5 py-1.5 text-sm rounded-lg transition-colors"
            :class="currentPage === totalPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'"
            :disabled="currentPage === totalPages"
            @click="goToPage(currentPage + 1)"
          >下一页</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-100 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-2">
        <div class="text-xs text-gray-400">标讯宝 — 免费标讯查询平台</div>
        <div class="text-xs text-gray-400">数据来源：国家级平台 · 省级平台 · 招标代理 · 医院高校</div>
      </div>
      <div class="mt-4 pt-4 border-t border-gray-100 text-center text-xs text-gray-400">
        © 2026 标讯宝 · 未经许可禁止批量抓取数据
      </div>
    </div>
  </footer>

  <script>
    function listApp() {
      return {
        keyword: '',
        filters: { region: '', category: '', sources: [], dateRange: 'all', sort: 'newest', keywords: [] },
        subscriptionGroups: [],
        totalKeywords: 0,
        currentPage: 1,
        pageSize: 15,
        regions: ['北京','上海','天津','重庆','河北','山西','内蒙古','辽宁','吉林','黑龙江','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','广西','海南','四川','贵州','云南','西藏','陕西','甘肃','青海','宁夏','新疆'],
        categories: ['公开招标','中标/成交','更正公告','废标','竞争性磋商','询价','谈判采购','方案征集','竞价'],
        sources: ['国招平台', '政府采购网', '省平台', '招标代理', '医院官网', '高校官网'],
        bids: [],
        totalResults: 0,
        totalPages: 1,
        loading: false,

        async init() {
          const params = new URLSearchParams(window.location.search);
          if (params.get('q')) this.keyword = params.get('q');
          if (params.get('region')) this.filters.region = params.get('region');
          if (params.get('cat')) this.filters.category = params.get('cat');
          if (params.get('time')) this.filters.dateRange = params.get('time');
          if (params.get('page')) this.currentPage = parseInt(params.get('page'), 10) || 1;
          // Load subscription groups from localStorage
          try {
            const data = localStorage.getItem('subscription_groups');
            if (data) {
              this.subscriptionGroups = JSON.parse(data);
            } else {
              // Legacy: old flat keywords format
              const legacy = localStorage.getItem('subscription_keywords');
              if (legacy) {
                const oldKws = JSON.parse(legacy);
                if (Array.isArray(oldKws) && oldKws.length > 0) {
                  this.subscriptionGroups = [{ name: '默认', keywords: oldKws }];
                }
              }
            }
            // Ensure all groups have keywords array
            this.subscriptionGroups.forEach(g => {
              if (!g.keywords) g.keywords = [];
            });
            // Count total
            this.totalKeywords = 0;
            this.subscriptionGroups.forEach(g => { this.totalKeywords += g.keywords.length; });
          } catch(e) {
            this.subscriptionGroups = [];
            this.totalKeywords = 0;
          }
          await this.loadData();
        },

        async loadData() {
          this.loading = true;
          const q = this.keyword.trim();
          const reg = this.filters.region;
          const cat = this.filters.category;
          const kwStr = this.filters.keywords.join(' ');
          const searchQ = [q, kwStr].filter(Boolean).join(' ');
          const url = '/api/bids?page=' + this.currentPage + '&pageSize=' + this.pageSize
            + (searchQ ? '&q=' + encodeURIComponent(searchQ) : '')
            + (reg ? '&region=' + encodeURIComponent(reg) : '');
          try {
            const resp = await fetch(url);
            const data = await resp.json();
            this.bids = data.items || [];
            this.totalResults = data.total || 0;
            this.totalPages = data.totalPages || 1;
            // Sync URL
            const urlObj = new URL(window.location);
            if (q) urlObj.searchParams.set('q', q); else urlObj.searchParams.delete('q');
            if (reg) urlObj.searchParams.set('region', reg); else urlObj.searchParams.delete('region');
            if (cat) urlObj.searchParams.set('cat', cat); else urlObj.searchParams.delete('cat');
            if (this.filters.dateRange !== 'all') urlObj.searchParams.set('time', this.filters.dateRange); else urlObj.searchParams.delete('time');
            if (this.currentPage > 1) urlObj.searchParams.set('page', this.currentPage); else urlObj.searchParams.delete('page');
            window.history.replaceState({}, '', urlObj);
          } catch(e) {
            console.error(e);
          }
          this.loading = false;
        },

        search() {
          this.currentPage = 1;
          this.loadData();
        },
        selectKeyword(kw) {
          if (this.filters.keywords.includes(kw)) {
            this.filters.keywords = this.filters.keywords.filter(k => k !== kw);
          } else {
            this.filters.keywords.push(kw);
          }
          this.currentPage = 1;
        },
        selectAllGroup(group) {
          const allInGroup = group.keywords;
          const allSelected = allInGroup.every(kw => this.filters.keywords.includes(kw));
          if (allSelected) {
            // Remove all from this group
            this.filters.keywords = this.filters.keywords.filter(k => !allInGroup.includes(k));
          } else {
            // Add all from this group
            for (const kw of allInGroup) {
              if (!this.filters.keywords.includes(kw)) {
                this.filters.keywords.push(kw);
              }
            }
          }
          this.currentPage = 1;
        },
        allGroupSelected(group) {
          return group.keywords.length > 0 && group.keywords.every(kw => this.filters.keywords.includes(kw));
        },
        removeKeyword(idx) {
          this.filters.keywords.splice(idx, 1);
          this.currentPage = 1;
        },

        goToPage(p) {
          if (p < 1 || p > this.totalPages) return;
          this.currentPage = p;
          this.loadData();
        },

        resetFilters() {
          this.filters = { region: '', category: '', sources: [], dateRange: 'all', sort: 'newest', keywords: [] };
          this.keyword = '';
          this.currentPage = 1;
          const url = new URL(window.location);
          url.searchParams.delete('q');
          url.searchParams.delete('region');
          url.searchParams.delete('cat');
          url.searchParams.delete('time');
          url.searchParams.delete('page');
          window.history.replaceState({}, '', url);
          this.loadData();
        },

        highlightTitle(text) {
          if (!text || !this.keyword.trim()) return text;
          const keywords = this.keyword.trim().split(',').map(k => k.trim()).filter(k => k);
          let result = text;
          keywords.forEach(kw => {
            if (!kw) return;
            const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            result = result.replace(regex, '<span style="color:red">$1</span>');
          });
          return result;
        },

        // Client-side filters applied on API page data
        get filteredBids() {
          let result = this.bids;
          if (this.filters.category) {
            result = result.filter(b => b.method === this.filters.category);
          }
          if (this.filters.sources.length > 0) {
            result = result.filter(b => this.filters.sources.includes(b.source));
          }
          if (this.filters.dateRange !== 'all') {
            const now = new Date();
            const ranges = { 'today': 1, '3days': 3, 'week': 7, 'month': 30 };
            const days = ranges[this.filters.dateRange] || 0;
            if (days > 0) {
              const cutoff = new Date(now.setDate(now.getDate() - days));
              result = result.filter(b => b.date && new Date(b.date) >= cutoff);
            }
          }
          if (this.filters.sort === 'newest') {
            result.sort((a, b) => new Date(b.date) - new Date(a.date));
          }
          return result;
        },

        get pagedBids() {
          return this.filteredBids;
        },

        dateRangeLabel(val) {
          const map = { 'all': '时间', 'today': '今天', '3days': '近3天', 'week': '近一周', 'month': '近一月' };
          return map[val] || '时间';
        },

        sourceBadgeClass(source) {
          const map = {
            '国招平台': 'bg-blue-50 text-blue-600 border-blue-200',
            '政府采购网': 'bg-emerald-50 text-emerald-600 border-emerald-200',
            '省平台': 'bg-purple-50 text-purple-600 border-purple-200',
            '招标代理': 'bg-orange-50 text-orange-600 border-orange-200',
            '医院官网': 'bg-rose-50 text-rose-600 border-rose-200',
            '高校官网': 'bg-cyan-50 text-cyan-600 border-cyan-200',
          };
          return map[source] || 'bg-gray-50 text-gray-600 border-gray-200';
        },

        getPageWindow() {
          const total = this.totalPages;
          const current = this.currentPage;
          const maxVisible = 7;
          if (total <= maxVisible) {
            return Array.from({length: total}, (_, i) => i + 1);
          }
          const half = Math.floor(maxVisible / 2);
          let start = Math.max(1, current - half);
          let end = Math.min(total, start + maxVisible - 1);
          if (end - start + 1 < maxVisible) {
            start = Math.max(1, end - maxVisible + 1);
          }
          return Array.from({length: end - start + 1}, (_, i) => start + i);
        }
      }
    }
  </script>

  <script>
    function subscribePrompt() {
      return {
        showModal: false,
        init() {
          setTimeout(() => {
            this.showModal = true
          }, 3000)

        openModal() { this.showModal = true },
        closeModal() { this.showModal = false }
      }
