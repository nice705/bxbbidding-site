  <script>
    function listApp() {
      return {
        keyword: '',
        filters: { region: '', category: '', sources: [], dateRange: 'all', sort: 'newest', keywords: [] },
        subscriptionGroups: [],
        totalKeywords: 0,
        currentPage: 1,
        pageSize: 15,
        regions: ['北京','上海','天津','重庆','河北','山西','内蒙古','辽宁','吉林','黑龙江','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','广西','海南','四川','贵州','云南','西藏','陕西','甘肃','青海','宁夏','新疆'],
        categories: [],
        sources: ['国招平台', '政府采购网', '省平台', '招标代理', '医院官网', '高校官网'],
        bids: [],
        totalResults: 0,
        totalPages: 1,
        loading: false,
        favedIds: {},

        async init() {
          this.loadFavs();
          const params = new URLSearchParams(window.location.search);
          if (params.get('q')) this.keyword = params.get('q');
          if (params.get('region')) this.filters.region = params.get('region');
          if (params.get('cat')) this.filters.category = params.get('cat');
          if (params.get('time')) this.filters.dateRange = params.get('time');
          if (params.get('page')) this.currentPage = parseInt(params.get('page'), 10) || 1;
          // 动态加载采购方式列表
          try {
            const resp = await fetch('/api/methods');
            const data = await resp.json();
            if (data.methods) this.categories = data.methods;
          } catch(e) {
            this.categories = ['公开招标','中标公告','竞争性磋商','询价','更正公告'];
          }
          // Load subscription groups from localStorage
          try {
            const data = localStorage.getItem('subscription_groups');
            if (data) {
              this.subscriptionGroups = JSON.parse(data);
            } else {
              // Legacy: old flat keywords format
              const legacy = localStorage.getItem('subscription_keywords');
              if (legacy) {
                const oldKws = JSON.parse(legacy);
                if (Array.isArray(oldKws) && oldKws.length > 0) {
                  this.subscriptionGroups = [{ name: '默认', keywords: oldKws }];
                }
              }
            }
            // Ensure all groups have keywords array
            this.subscriptionGroups.forEach(g => {
              if (!g.keywords) g.keywords = [];
            });
            // Count total
            this.totalKeywords = 0;
            this.subscriptionGroups.forEach(g => { this.totalKeywords += g.keywords.length; });
          } catch(e) {
            this.subscriptionGroups = [];
            this.totalKeywords = 0;
          }
          await this.loadData();
        },

        loadFavs() {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fav_') && !k.startsWith('fav_meta_')) {
              this.favedIds[k.slice(4)] = true;
            }
          }
        },

        async loadData() {
          this.loading = true;
          const q = this.keyword.trim();
          const reg = this.filters.region;
          const cat = this.filters.category;
          const kwStr = this.filters.keywords.join(' ');
          const searchQ = [q, kwStr].filter(Boolean).join(' ');
          const url = '/api/bids?page=' + this.currentPage + '&pageSize=' + this.pageSize
            + (searchQ ? '&q=' + encodeURIComponent(searchQ) : '')
            + (reg ? '&region=' + encodeURIComponent(reg) : '')
            + (cat ? '&method=' + encodeURIComponent(cat) : '');
          try {
            const resp = await fetch(url);
            const data = await resp.json();
            this.bids = data.bids || data.items || [];
            this.totalResults = data.total || 0;
            this.totalPages = data.totalPages || 1;
            // Sync URL
            const urlObj = new URL(window.location);
            if (q) urlObj.searchParams.set('q', q); else urlObj.searchParams.delete('q');
            if (reg) urlObj.searchParams.set('region', reg); else urlObj.searchParams.delete('region');
            if (cat) urlObj.searchParams.set('cat', cat); else urlObj.searchParams.delete('cat');
            if (this.filters.dateRange !== 'all') urlObj.searchParams.set('time', this.filters.dateRange); else urlObj.searchParams.delete('time');
            if (this.currentPage > 1) urlObj.searchParams.set('page', this.currentPage); else urlObj.searchParams.delete('page');
            window.history.replaceState({}, '', urlObj);
          } catch(e) {
            console.error(e);
          }
          this.loading = false;
        },

        search() {
          this.currentPage = 1;
          this.loadData();
        },
        selectKeyword(kw) {
          if (this.filters.keywords.includes(kw)) {
            this.filters.keywords = this.filters.keywords.filter(k => k !== kw);
          } else {
            this.filters.keywords.push(kw);
          }
          this.currentPage = 1;
        },
        selectAllGroup(group) {
          const allInGroup = group.keywords;
          const allSelected = allInGroup.every(kw => this.filters.keywords.includes(kw));
          if (allSelected) {
            // Remove all from this group
            this.filters.keywords = this.filters.keywords.filter(k => !allInGroup.includes(k));
          } else {
            // Add all from this group
            for (const kw of allInGroup) {
              if (!this.filters.keywords.includes(kw)) {
                this.filters.keywords.push(kw);
              }
            }
          }
          this.currentPage = 1;
        },
        allGroupSelected(group) {
          return group.keywords.length > 0 && group.keywords.every(kw => this.filters.keywords.includes(kw));
        },
        removeKeyword(idx) {
          this.filters.keywords.splice(idx, 1);
          this.currentPage = 1;
        },

        goToPage(p) {
          if (p < 1 || p > this.totalPages) return;
          this.currentPage = p;
          this.loadData();
        },

        resetFilters() {
          this.filters = { region: '', category: '', sources: [], dateRange: 'all', sort: 'newest', keywords: [] };
          this.keyword = '';
          this.currentPage = 1;
          const url = new URL(window.location);
          url.searchParams.delete('q');
          url.searchParams.delete('region');
          url.searchParams.delete('cat');
          url.searchParams.delete('time');
          url.searchParams.delete('page');
          window.history.replaceState({}, '', url);
          this.loadData();
        },

        highlightTitle(text) {
          if (!text || !this.keyword.trim()) return text;
          const keywords = this.keyword.trim().split(',').map(k => k.trim()).filter(k => k);
          let result = text;
          keywords.forEach(kw => {
            if (!kw) return;
            const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            result = result.replace(regex, '<span style="color:red">$1</span>');
          });
          return result;
        },

        // Client-side filters applied on API page data
        get filteredBids() {
          let result = this.bids;
          if (this.filters.category) {
            result = result.filter(b => b.method === this.filters.category);
          }
          if (this.filters.sources.length > 0) {
            result = result.filter(b => this.filters.sources.includes(b.source));
          }
          if (this.filters.dateRange !== 'all') {
            const now = new Date();
            const ranges = { 'today': 1, '3days': 3, 'week': 7, 'month': 30 };
            const days = ranges[this.filters.dateRange] || 0;
            if (days > 0) {
              const cutoff = new Date(now.setDate(now.getDate() - days));
              result = result.filter(b => b.date && new Date(b.date) >= cutoff);
            }
          }
          if (this.filters.sort === 'newest') {
            result.sort((a, b) => new Date(b.date) - new Date(a.date));
          }
          return result;
        },

        get pagedBids() {
          return this.filteredBids;
        },

        dateRangeLabel(val) {
          const map = { 'all': '时间', 'today': '今天', '3days': '近3天', 'week': '近一周', 'month': '近一月' };
          return map[val] || '时间';
        },

        sourceBadgeClass(source) {
          const map = {
            '国招平台': 'bg-blue-50 text-blue-600 border-blue-200',
            '政府采购网': 'bg-emerald-50 text-emerald-600 border-emerald-200',
            '省平台': 'bg-purple-50 text-purple-600 border-purple-200',
            '招标代理': 'bg-orange-50 text-orange-600 border-orange-200',
            '医院官网': 'bg-rose-50 text-rose-600 border-rose-200',
            '高校官网': 'bg-cyan-50 text-cyan-600 border-cyan-200',
          };
          return map[source] || 'bg-gray-50 text-gray-600 border-gray-200';
        },

        getPageWindow() {
          const total = this.totalPages;
          const current = this.currentPage;
          const maxVisible = 7;
          if (total <= maxVisible) {
            return Array.from({length: total}, (_, i) => i + 1);
          }
          const half = Math.floor(maxVisible / 2);
          let start = Math.max(1, current - half);
          let end = Math.min(total, start + maxVisible - 1);
          if (end - start + 1 < maxVisible) {
            start = Math.max(1, end - maxVisible + 1);
          }
          return Array.from({length: end - start + 1}, (_, i) => start + i);
        },

        // —— 类型Badge颜色 ——
        methodBadgeClass(method) {
          const map = {
            '公开招标': 'bg-blue-50 text-blue-600',
            '中标公告': 'bg-green-50 text-green-600',
            '中标/成交': 'bg-green-50 text-green-600',
            '更正公告': 'bg-orange-50 text-orange-600',
            '废标': 'bg-red-50 text-red-600',
            '竞争性磋商': 'bg-purple-50 text-purple-600',
            '竞争性谈判': 'bg-purple-50 text-purple-600',
            '询价': 'bg-cyan-50 text-cyan-600',
            '询价公告': 'bg-cyan-50 text-cyan-600',
            '单一来源': 'bg-pink-50 text-pink-600',
            '其他公告': 'bg-gray-50 text-gray-500',
            '预告': 'bg-amber-50 text-amber-600',
            '方案征集': 'bg-gray-50 text-gray-600',
            '竞价': 'bg-yellow-50 text-yellow-600',
          };
          return map[method] || 'bg-gray-50 text-gray-600';
        },

        // —— 倒计时 ——
        countdownText(deadline) {
          if (!deadline) return '';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return '⏰ 已截止';
          if (diff === 1) return '⏰ 今日截止';
          return `⏰ 剩余${diff}天`;
        },
        countdownClass(deadline) {
          if (!deadline) return 'text-gray-400';
          const now = new Date();
          const end = new Date(deadline);
          const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
          if (diff <= 0) return 'text-red-500 font-medium';
          if (diff <= 3) return 'text-orange-500 font-medium';
          return 'text-gray-500';
        },

        // —— 收藏 ——
        toggleFav(id, title) {
          if (this.favedIds[id]) {
            delete this.favedIds[id];
            localStorage.removeItem('fav_' + id);
            localStorage.removeItem('fav_meta_' + id);
          } else {
            this.favedIds[id] = true;
            localStorage.setItem('fav_' + id, 'true');
            localStorage.setItem('fav_meta_' + id, JSON.stringify({ title, date: new Date().toISOString() }));
          }
        },
        isFav(id) {
          return !!this.favedIds[id];
        },

        // —— 来源文本颜色 ——
        sourceTextClass(source) {
          const map = {
            '国招平台': 'text-blue-600',
            '政府采购网': 'text-emerald-600',
            '省平台': 'text-purple-600',
            '招标代理': 'text-orange-600',
            '医院官网': 'text-rose-600',
            '高校官网': 'text-cyan-600',
            '招标投标公共服务平台': 'text-blue-600',
          };
          return map[source] || 'text-gray-500';
        },
      }
    }
  </script>
