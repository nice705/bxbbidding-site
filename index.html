<head>

  </script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/theme/light.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://lib.baomitu.com/alpinejs/3.14.9/cdn.min.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
    .tag-pill { cursor: pointer; transition: all 0.15s ease; }
    .tag-pill:hover { transform: scale(1.05); }
    .search-input:focus { box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    [x-cloak] { display: none !important; }
    /* 暗色模式 — 柔和化亮绿 */
    @media (prefers-color-scheme: dark) and (max-width: 767px) {
      .hero-gradient { background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%); }

      [class*="text-emerald-600"] { color: #6ee7b7 !important; }

      [class*="bg-emerald-50"] { background: #064e3b !important; }
      [class*="border-gray-100"] { border-color: #374151 !important; }
      input, select { background: #374151 !important; color: #f3f4f6 !important; border-color: #4b5563 !important; }

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#059669',
            'primary-dark': '#047857',

        }
      }

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "bcb4a0d224e14f5e93f5a0b2ff7c1b32"}'></script>
<style>body { font-size: 0; line-height: 0; } body > *:not(#app) { display: none !important; } #app { font-size: 16px; line-height: 1.5; }</style>

<body>
<script>
  // Clean up Cloudflare SEO injection
  document.addEventListener("DOMContentLoaded", function() {
    var h1 = document.querySelector("body > h1[style]");
    if (h1) h1.remove();
    var body = document.body;
    while (body.firstChild && body.firstChild.nodeType === 3) {
      body.removeChild(body.firstChild);
    }
  });
</script>
<div id="app" class="bg-gray-50 min-h-screen overflow-x-hidden pb-24" x-data="app()">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
          <a href="/" class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-lg hero-gradient flex items-center justify-center">
              <span class="text-white font-bold text-xs">标</span>
            </div>
            <span class="text-lg font-bold text-gray-900">标讯宝</span>
          </a>
          <div class="hidden md:flex items-center gap-5">
            <a href="/" class="text-emerald-600 font-medium text-sm">首页</a>
            <a href="/list.html" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">标讯大全</a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-gray-400 hidden sm:block">全网标讯 · 完全免费</span>
          <div class="badge badge-outline badge-sm text-emerald-600 border-emerald-200 bg-emerald-50 whitespace-nowrap">今日更新 <span class="font-bold" x-text="stats.todayCount"></span> 条</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section (compact) -->
  <section class="hero-gradient">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
      <div class="text-center max-w-3xl mx-auto">
        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-white mb-2 leading-tight">
          全国全行业招标采购信息
        </h1>
        <p class="text-emerald-100 text-sm sm:text-base mb-5">
          源头信息 · 完全免费 · 每日更新
        </p>
        <!-- Search Box -->
        <div class="max-w-2xl mx-auto">
          <div class="flex gap-2">
            <div class="relative flex-1">
              <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input
                type="text"
                placeholder="输入关键词搜索标讯"
                class="search-input w-full pl-10 pr-3.5 py-2.5 rounded-lg border-0 text-gray-900 bg-white shadow text-sm focus:ring-2 focus:ring-emerald-300"
                x-model="searchKeyword"
                @keydown.enter="doSearch()"
              />
            </div>
            <button
              class="px-5 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors shadow flex items-center gap-1.5"
              @click="doSearch()"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              搜索
            </button>
          </div>
          <!-- Hot Tags -->
          <div class="flex flex-wrap items-center justify-center gap-x-2 gap-y-1.5 mt-3" x-show="hotTags.length > 0">
            <span class="text-emerald-100 text-xs font-medium">热门搜索：</span>
            <template x-for="tag in hotTags" :key="tag">
              <span
                class="tag-pill px-2 py-0.5 bg-white/20 text-white text-xs rounded-full hover:bg-white/30 transition-colors"
                @click="searchKeyword = tag; doSearch()"
                x-text="tag"
              ></span>
            </template>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">

    <!-- Bids Section -->
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base font-bold text-gray-900">
        最新标讯
        <span class="text-sm font-normal text-gray-400 ml-1" x-text="'(' + visibleCount + '/' + filteredAll.length + ')'"></span>
      </h2>
      <a href="/list.html" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-1">
        查看全部
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>
    </div>
    <!-- 筛选栏 -->
    <div class="flex gap-2 mb-3">
      <!-- 地区 -->
      <div class="relative flex-1" x-data="{ dfOpen: false }">
        <button @click="dfOpen = !dfOpen; $event.stopPropagation()"
          class="flex items-center justify-center gap-1 w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
          <span x-text="filters.region || '地区'" :class="filters.region ? 'text-gray-700 font-medium' : 'text-gray-400'"></span>
          <svg class="w-3 h-3 text-gray-400 transition-transform" :class="dfOpen && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div x-show="dfOpen" x-cloak @click.away="dfOpen = false"
          class="fixed inset-0 z-40" @click="dfOpen = false"></div>
        <div x-show="dfOpen" x-cloak
          class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto min-w-[100px] py-0.5 w-full">
          <button @click="filters.region = ''; dfOpen = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="!filters.region ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">全国</button>
          <template x-for="reg in regions" :key="reg">
            <button @click="filters.region = reg; dfOpen = false; applyFilters()"
              class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
              :class="filters.region === reg ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'"
              x-text="reg"></button>
          </template>
        </div>
      </div>
      <!-- 方式（招标方式） -->
      <div class="relative flex-1" x-data="{ dfOpen2: false }">
        <button @click="dfOpen2 = !dfOpen2; $event.stopPropagation()"
          class="flex items-center justify-center gap-1 w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
          <span x-text="filters.method || '方式'" :class="filters.method ? 'text-gray-700 font-medium' : 'text-gray-400'"></span>
          <svg class="w-3 h-3 text-gray-400 transition-transform" :class="dfOpen2 && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div x-show="dfOpen2" x-cloak @click.away="dfOpen2 = false"
          class="fixed inset-0 z-40" @click="dfOpen2 = false"></div>
        <div x-show="dfOpen2" x-cloak
          class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto min-w-[110px] py-0.5 w-full">
          <button @click="filters.method = ''; dfOpen2 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="!filters.method ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">全部</button>
          <template x-for="m in methods" :key="m">
            <button @click="filters.method = m; dfOpen2 = false; applyFilters()"
              class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
              :class="filters.method === m ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'"
              x-text="m"></button>
          </template>
        </div>
      </div>
      <!-- 时间 -->
      <div class="relative flex-1" x-data="{ dfOpen3: false }">
        <button @click="dfOpen3 = !dfOpen3; $event.stopPropagation()"
          class="flex items-center justify-center gap-1 w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs bg-white whitespace-nowrap hover:border-gray-300 transition-colors">
          <span x-text="dateRangeLabel()" :class="filters.dateRange !== 'all' ? 'text-gray-700 font-medium' : 'text-gray-400'"></span>
          <svg class="w-3 h-3 text-gray-400 transition-transform" :class="dfOpen3 && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div x-show="dfOpen3" x-cloak @click.away="dfOpen3 = false"
          class="fixed inset-0 z-40" @click="dfOpen3 = false"></div>
        <div x-show="dfOpen3" x-cloak
          class="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 overflow-y-auto min-w-[100px] py-0.5 w-full">
          <button @click="filters.dateRange = 'all'; dfOpen3 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="filters.dateRange === 'all' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">时间不限</button>
          <button @click="filters.dateRange = 'today'; dfOpen3 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="filters.dateRange === 'today' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">今天</button>
          <button @click="filters.dateRange = '3days'; dfOpen3 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="filters.dateRange === '3days' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近3天</button>
          <button @click="filters.dateRange = 'week'; dfOpen3 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="filters.dateRange === 'week' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近一周</button>
          <button @click="filters.dateRange = 'month'; dfOpen3 = false; applyFilters()"
            class="block w-full text-left px-2.5 py-1 text-xs hover:bg-emerald-50 transition-colors"
            :class="filters.dateRange === 'month' ? 'text-emerald-600 font-medium bg-emerald-50/50' : 'text-gray-600'">近一月</button>
        </div>
      </div>
    </div>

    <!-- Bids Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      <template x-for="(bid, idx) in visibleBids" :key="bid.id">
        <a :href="'/detail.html?id=' + bid.id" class="block bg-white rounded-xl shadow-sm border border-gray-100 p-4 card-hover fade-in relative">
          <!-- Favorite star -->
          <button @click.prevent="toggleFav(bid, $event)"
            class="absolute top-2 right-2 flex items-center gap-0.5 px-1.5 py-1 rounded-full hover:bg-gray-100 transition-colors z-10 text-xs"
            :title="isFav(bid.id) ? '取消收藏' : '收藏'">
            <svg class="w-3.5 h-3.5" :class="isFav(bid.id) ? 'text-yellow-400' : 'text-gray-300 hover:text-yellow-400'" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            <span class="text-gray-400" x-text="isFav(bid.id) ? '取消收藏' : '收藏'"></span>
          </button>
          <!-- Type badge -->
          <span class="inline-block text-xs font-medium px-1.5 py-0.5 rounded mb-2"
            :class="methodBadgeClass(bid.method)"
            x-text="bid.method || '公告'"></span>
          <span x-text="bid.region || ''" x-show="bid.region" class="text-xs text-gray-400 ml-1.5"></span>
          <!-- Title -->
          <h3 class="font-semibold text-gray-900 text-sm leading-snug mb-2 line-clamp-2 pr-6" x-text="bid.title"></h3>
          <!-- Product tags -->
          <div class="flex flex-wrap gap-1 mb-2" x-show="bid.products && bid.products.length > 0">
            <template x-for="p in bid.products.slice(0, 3)" :key="p">
              <span class="text-xs px-1.5 py-0.5 rounded-full bg-blue-50 text-blue-600 border border-blue-100" x-text="p"></span>
            </template>
            <span x-show="bid.products && bid.products.length > 3" class="text-xs text-gray-400">+<span x-text="bid.products.length - 3"></span></span>
          </div>
          <!-- Info row -->
          <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500 mb-2">
            <a href="/coming-soon.html" class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-100 transition cursor-pointer" @click.stop>查看潜在渠道商</a>
            <a href="/coming-soon.html" class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-100 transition cursor-pointer ml-auto" @click.stop>查看潜在供应商</a>
          </div>
          <!-- Budget + Deadline -->
          <div class="flex items-center justify-between text-xs pt-2 border-t border-gray-50">
            <span class="text-gray-500">💰 <span x-text="bid.budget || '暂无'"></span></span>
            <span>
              <span x-show="bid.deadline" class="inline-flex items-center gap-1"
                :class="countdownClass(bid.deadline)">
                <span x-text="countdownText(bid.deadline)"></span>
              </span>
              <span x-show="!bid.deadline" class="text-gray-400" x-text="bid.date || ''"></span>
            </span>
          </div>
        </a>
      </template>
    </div>

    <!-- Loading trigger -->
    <div id="scroll-trigger" class="h-4"></div>

    <!-- Loading spinner -->
    <div class="text-center py-8" x-show="loadingMore">
      <div class="loading loading-spinner loading-md text-emerald-600"></div>
      <p class="text-gray-400 text-xs mt-2">加载更多...</p>
    </div>

    <!-- No more -->
    <div class="text-center py-8" x-show="!loadingMore && visibleCount >= filteredAll.length && filteredAll.length > 0">
      <p class="text-gray-400 text-xs">— 已显示全部 <span class="font-medium" x-text="filteredAll.length"></span> 条标讯 —</p>
    </div>

    <!-- Empty state -->
    <div class="text-center py-16" x-show="filteredAll.length === 0">
      <div class="text-4xl mb-4">📭</div>
      <p class="text-gray-500">暂无匹配的标讯</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-100 mt-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <div class="w-5 h-5 rounded hero-gradient flex items-center justify-center">
            <span class="text-white font-bold text-xs">标</span>
          </div>
          <span class="text-sm font-medium text-gray-700">标讯宝</span>
          <span class="text-xs text-gray-400">— 免费标讯查询平台</span>
        </div>
        <div class="text-xs text-gray-400">
          数据来源：中国招标投标公共服务平台 · 中国政府采购网 · 各省公共资源交易平台 · 招标代理机构 · 医院高校官网
        </div>
      </div>
      <div class="mt-3 pt-3 border-t border-gray-50 text-center text-xs text-gray-400">
        © 2026 标讯宝 · 未经许可禁止批量抓取数据
      </div>
    </div>
  <!-- Bottom Tab Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-around h-16" style="padding-bottom: max(0, env(safe-area-inset-bottom));">
        <a href="/" class="flex flex-col items-center gap-0.5 group relative">
          <span class="absolute -top-1 w-1 h-1 rounded-full bg-emerald-600"></span>
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-xs font-medium text-emerald-600">首页</span>
        </a>
        <a href="/list.html" class="flex flex-col items-center gap-0.5 group">

<script>
    function app() {
      return {
        searchKeyword: '',
        selectedIndustry: '',
        hotTags: ['CT', '核磁共振', 'DSA', '彩超', '内窥镜', '信息化建设', '物业服务', '教学设备'],
        industries: ['医疗设备', 'IT信息化', '工程建设', '教育科研', '后勤服务', '纺织服装', '交通运输', '环保能源'],
        stats: { todayCount: 0 },
        // 筛选状态
        filters: {
          region: '',
          dateRange: 'all',
          keyword: '',
          method: '',
        },
        regions: ['北京','上海','天津','重庆','河北','山西','内蒙古','辽宁','吉林','黑龙江','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','广西','海南','四川','贵州','云南','西藏','陕西','甘肃','青海','宁夏','新疆'],
        methods: [],
        // 全部数据
        allBids: [],
        // 可见数量控制
        pageSize: 15,
        visibleLimit: 15,
        loadingMore: false,
        observer: null,
        favedIds: {},

        async init() {
          this.loadFavs();
          await this.loadData();
          // 从实际数据动态提取采购方式（按出现次数降序）
          const methodCount = {};
          this.allBids.forEach(b => { if (b.method) methodCount[b.method] = (methodCount[b.method] || 0) + 1; });
          this.methods = Object.keys(methodCount).sort((a, b) => methodCount[b] - methodCount[a]);
          this.setupInfiniteScroll();
        },

        loadFavs() {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('fav_') && !k.startsWith('fav_meta_')) {
              this.favedIds[k.slice(4)] = true;
            }
          }
        },

        async loadData() {
          try {
            const resp = await fetch('/data/bids-homepage.json');
            const data = await resp.json();
            this.allBids = data.bids || [];
            this.stats.todayCount = data.todayCount || 0;
          } catch(e) {
            this.allBids = [];
            this.stats.todayCount = 0;
          }
        },

        // 所有过滤后的数据
        get filteredAll() {
          let result = this.allBids;
          // 行业/类别
          if (this.filters.method) {
            result = result.filter(b => b.method === this.filters.method);
          }
          // 地区
          if (this.filters.region) {
            result = result.filter(b => b.region === this.filters.region);
          }
          // 时间范围
          if (this.filters.dateRange !== 'all') {
            const now = new Date();
            const days = { 'today': 0, '3days': 3, 'week': 7, 'month': 30 }[this.filters.dateRange] || 0;
            const cutoff = new Date(now.getTime() - days * 86400000);
            result = result.filter(b => {
              if (!b.date) return true;
              const d = new Date(b.date);
              return d >= cutoff && d <= now;
            });
          }
          // 关键词
          if (this.filters.keyword && this.filters.keyword.trim()) {
            const kw = this.filters.keyword.trim().toLowerCase();
            result = result.filter(b => {
              return (b.title && b.title.toLowerCase().includes(kw))
                || (b.buyer && b.buyer.toLowerCase().includes(kw))
                || (b.region && b.region === kw)
                || (b.industry && b.industry=== kw);
            });
          }
          return result;
        },

        // 是否有激活的筛选条件
        get hasActiveFilters() {
          return this.filters.region || this.filters.method || this.filters.dateRange !== 'all' || (this.filters.keyword.trim());
        },

        // 应用筛选（重置分页）
        applyFilters() {
          this.visibleLimit = this.pageSize;
          this.$nextTick(() => {
            if (this.observer) this.observer.disconnect();
            this.setupInfiniteScroll();
          });
        },

        // 重置全部筛选
        resetFilters() {
          this.filters.region = '';
          this.filters.method = '';
          this.filters.dateRange = 'all';
          this.filters.keyword = '';
          this.applyFilters();
        },

        // 时间标签
        dateRangeLabel() {
          const map = { 'all': '时间', 'today': '今天', '3days': '近3天', 'week': '近一周', 'month': '近一月' };
          return map[this.filters.dateRange] || '时间';
        },

        // 转跳到标讯大全（带当前筛选项）
        filtersToUrl() {
          const params = new URLSearchParams();
          if (this.filters.keyword.trim()) params.set('q', this.filters.keyword.trim());
          if (this.filters.region) params.set('region', this.filters.region);
          return '/list.html?' + params.toString();
        },

        // 当前可见的数据（分页截取）
        get visibleBids() {
          return this.filteredAll.slice(0, this.visibleLimit);
        },

        get visibleCount() {
          return Math.min(this.visibleLimit, this.filteredAll.length);
        },

        // 重置无限滚动（切换行业时）
        resetInfiniteScroll() {
          this.visibleLimit = this.pageSize;
          this.loadingMore = false;
          // 重新绑定观察器
          this.$nextTick(() => {
            if (this.observer) this.observer.disconnect();
            this.setupInfiniteScroll();
          });
        },

        setupInfiniteScroll() {
          this.observer = new IntersectionObserver((entries) => {
            const entry = entries[0];
            if (entry.isIntersecting && !this.loadingMore && this.visibleLimit < this.filteredAll.length) {
              this.loadMore();
            }
          }, { rootMargin: '200px' });

          this.$nextTick(() => {
            const trigger = document.getElementById('scroll-trigger');
            if (trigger) this.observer.observe(trigger);
          });
        },

        loadMore() {
          this.loadingMore = true;
          // 模拟加载延迟（让用户体验到加载感）
          setTimeout(() => {
            this.visibleLimit += this.pageSize;
            this.loadingMore = false;
          }, 300);
        },


        doSearch() {
          if (!this.searchKeyword.trim()) return;
          window.location.href = '/list.html?q=' + encodeURIComponent(this.searchKeyword.trim());
        },

        // —— 类型Badge颜色 ——
        methodBadgeClass(m) {
          const map = {'公开招标':'bg-blue-50 text-blue-600','中标公告':'bg-green-50 text-green-600','中标/成交':'bg-green-50 text-green-600','更正公告':'bg-orange-50 text-orange-600','废标':'bg-red-50 text-red-600','竞争性磋商':'bg-purple-50 text-purple-600','竞争性谈判':'bg-purple-50 text-purple-600','询价':'bg-cyan-50 text-cyan-600','单一来源':'bg-pink-50 text-pink-600','其他公告':'bg-gray-50 text-gray-500','预告':'bg-amber-50 text-amber-600','方案征集':'bg-gray-50 text-gray-600','竞价':'bg-yellow-50 text-yellow-600'};
          return map[m] || 'bg-gray-50 text-gray-600';
        },

        // —— 倒计时 ——
        countdownText(d) {
          if (!d) return '';
          const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
          if (diff <= 0) return '⏰ 已截止';
          if (diff === 1) return '⏰ 今日截止';
          return `⏰ 剩余${diff}天`;
        },
        countdownClass(d) {
          if (!d) return 'text-gray-400';
          const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
          if (diff <= 0) return 'text-red-500 font-medium';
          if (diff <= 3) return 'text-orange-500 font-medium';
          return 'text-gray-500';
        },

        // —— 收藏 ——
        toggleFav(bid, event) {
          const id = bid.id || bid._id;
          const title = bid.title || '';
          if (this.favedIds[id]) {
            delete this.favedIds[id];
            localStorage.removeItem('fav_' + id);
            localStorage.removeItem('fav_meta_' + id);
          } else {
            this.favedIds[id] = true;
            localStorage.setItem('fav_' + id, 'true');
            localStorage.setItem('fav_meta_' + id, JSON.stringify({
              title,
              method: bid.method || '',
              source: bid.source || '',
              industry: bid.industry || '',
              region: bid.region || '',
              budget: bid.budget || '',
              date: bid.date || '',
              deadline: bid.deadline || '',
              savedAt: new Date().toISOString(),
            }));
          }
          // 阻止事件冒泡，避免点击收藏同时打开详情
          if (event) event.stopPropagation();
        },
        isFav(id) {
          return !!this.favedIds[id];
        },

      }
    }
  </script>


</div>

          </button>
        </div>
        <img src="/static/wxpusher-qr.svg" alt="微信扫码关注" class="w-44 mx-auto mb-3">
        <p class="text-base font-semibold text-gray-800">📢 免费订阅每日标讯</p>

  <script>
    function subscribePrompt() {
      return {
        showModal: false,
        init() {
          if (window.innerWidth >= 768) {
            setTimeout(() => { this.showModal = true }, 3000)
          }
        },
        openModal() { this.showModal = true },
        closeModal() { this.showModal = false }
      }
    }
  </script>
